name: Build Android APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
      - uses: android-actions/setup-android@v3

      - run: npm install --no-audit --no-fund
      - run: npm run build
      - run: rm -rf android
      - run: npx cap add android
      - run: npx cap sync android

      - name: Register mirr:// deep-link in AndroidManifest
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path("android/app/src/main/AndroidManifest.xml")
          x = p.read_text()
          if "mirr" in x:
            print("already patched"); raise SystemExit(0)
          intent = '''
                <intent-filter android:autoVerify="false">
                    <action android:name="android.intent.action.VIEW" />
                    <category android:name="android.intent.category.DEFAULT" />
                    <category android:name="android.intent.category.BROWSABLE" />
                    <data android:scheme="mirr" android:host="callback" />
                </intent-filter>
          '''
          x2 = re.sub(r"(</activity>)", intent + r"\n            \1", x, count=1)
          p.write_text(x2)
          print("patched")
          PY
          cat android/app/src/main/AndroidManifest.xml

      - name: Generate app icons
        run: |
          mkdir -p assets
          cp src-tauri/icons/icon.png assets/icon.png
          cp src-tauri/icons/icon.png assets/icon-foreground.png
          cp src-tauri/icons/icon.png assets/icon-background.png
          npx -y @capacitor/assets generate --android --assetPath assets || true

      - name: Build APK (debug, signed with debug key)
        working-directory: android
        run: ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: mirr-android-apk
          path: android/app/build/outputs/apk/debug/*.apk

      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
