name: Build Android APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
      - uses: android-actions/setup-android@v3

      - run: npm install --no-audit --no-fund
      - run: npm run build
      - run: rm -rf android
      - run: npx cap add android
      - run: npx cap sync android

      - name: Generate app icons
        run: |
          mkdir -p assets
          cp src-tauri/icons/icon.png assets/icon.png
          cp src-tauri/icons/icon.png assets/icon-foreground.png
          cp src-tauri/icons/icon.png assets/icon-background.png
          npx -y @capacitor/assets generate --android --assetPath assets || true

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: mirr-android-apk
          path: android/app/build/outputs/apk/release/*.apk
