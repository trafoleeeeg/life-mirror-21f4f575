name: Build Windows (Tauri)

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.8)'
        required: true
        type: string
  workflow_call:
    inputs:
      tag:
        description: 'Tag to build'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag must be semver like v0.1.4 (got '$TAG')."
            exit 1
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT
          echo "Building version: ${TAG#v}"

      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: 'src-tauri -> target' }

      - run: npm install --no-audit --no-fund
      - name: Install Tauri CLI
        run: npm i -D @tauri-apps/cli@^2

      - name: Build signed bundles + updater artifacts
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build

      - name: Generate latest.json
        shell: pwsh
        env:
          TAG_NAME: ${{ steps.tag.outputs.tag }}
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          $bundleDir = "src-tauri/target/release/bundle"
          $nsisExe = Get-ChildItem "$bundleDir/nsis" -Filter "*-setup.exe" | Select-Object -First 1
          $sigFile = Get-ChildItem "$bundleDir/nsis" -Filter "*-setup.exe.sig" | Select-Object -First 1
          if (-not $nsisExe -or -not $sigFile) {
            Write-Error "NSIS bundle or signature not found"
            exit 1
          }
          $signature = Get-Content $sigFile.FullName -Raw
          $downloadUrl = "https://github.com/${{ github.repository }}/releases/download/$env:TAG_NAME/$($nsisExe.Name)"
          $latest = @{
            version = $env:VERSION
            notes = "Автоматическое обновление Mirr v$env:VERSION"
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature.Trim()
                url = $downloadUrl
              }
            }
          }
          $latest | ConvertTo-Json -Depth 5 | Out-File -FilePath "latest.json" -Encoding utf8

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Mirr ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/nsis/*-setup.exe.sig
            latest.json

      - uses: actions/upload-artifact@v4
        with:
          name: mirr-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*-setup.exe
            latest.json
