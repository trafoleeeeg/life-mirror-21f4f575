name: Build Windows (Tauri)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate tag
        shell: bash
        run: |
          REF="${GITHUB_REF_NAME}"
          if [[ ! "$REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Workflow must be triggered by a semver tag like v0.1.4 (got '$REF'). Push a tag instead of running manually from a branch."
            exit 1
          fi
          echo "Building version: ${REF#v}"
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: 'src-tauri -> target' }

      - run: npm install --no-audit --no-fund
      - name: Install Tauri CLI
        run: npm i -D @tauri-apps/cli@^2

      - name: Build signed bundles + updater artifacts
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build

      - name: Generate latest.json
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $version = $env:TAG_NAME -replace '^v',''
          $bundleDir = "src-tauri/target/release/bundle"
          $nsisExe = Get-ChildItem "$bundleDir/nsis" -Filter "*-setup.exe" | Select-Object -First 1
          $sigFile = Get-ChildItem "$bundleDir/nsis" -Filter "*-setup.exe.sig" | Select-Object -First 1
          if (-not $nsisExe -or -not $sigFile) {
            Write-Error "NSIS bundle or signature not found"
            exit 1
          }
          $signature = Get-Content $sigFile.FullName -Raw
          $downloadUrl = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$($nsisExe.Name)"
          $latest = @{
            version = $version
            notes = "Автоматическое обновление Mirr v$version"
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature.Trim()
                url = $downloadUrl
              }
            }
          }
          $latest | ConvertTo-Json -Depth 5 | Out-File -FilePath "latest.json" -Encoding utf8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Mirr ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/nsis/*-setup.exe.sig
            latest.json

      - uses: actions/upload-artifact@v4
        with:
          name: mirr-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*-setup.exe
            latest.json
